version: 2
project_name: olx-pp-cli
changelog:
  disable: true
builds:
  - id: olx-pp-cli
    main: ./cmd/olx-pp-cli
    binary: olx-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X olx-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: olx-pp-mcp
    main: ./cmd/olx-pp-mcp
    binary: olx-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: olx-pp-cli
    repository:
      owner: dskibickikono-lang
      name: homebrew-tap
    homepage: "https://github.com/dskibickikono-lang/olx-pp-cli"
    description: "OLX.pl job-listings reverse-engineered API (public, no auth)"
    install: |
      bin.install "olx-pp-cli"
      bin.install "olx-pp-mcp"
